services:
  - type: web
    name: barbearia-dom-cabral
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && PLAYWRIGHT_BROWSERS_PATH=0 python -m playwright install --force chromium
    startCommand: PLAYWRIGHT_BROWSERS_PATH=0 uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASS
        value: admin123