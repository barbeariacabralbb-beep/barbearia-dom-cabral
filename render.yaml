services:
  - type: web
    name: barbearia-dom-cabral
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && playwright install --with-deps chromium
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASS
        value: admin123
